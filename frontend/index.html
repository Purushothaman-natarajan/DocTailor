<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocTailor - Document Customization Toolkit</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DocTailor</h1>
            <p>Intelligent Document Customization Toolkit</p>
        </header>
        
        <main>
            <div class="sidebar">
                <h2>Configuration</h2>
                <form id="configForm">
                    <div class="form-group">
                        <label for="templateSelect">Template:</label>
                        <select id="templateSelect">
                            <option value="">Select a template...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="clientSelect">Client:</label>
                        <select id="clientSelect">
                            <option value="">Select a client...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="llmProvider">LLM Provider (Optional):</label>
                        <select id="llmProvider">
                            <option value="">None</option>
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="google">Google</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="llmModel">Model:</label>
                        <input type="text" id="llmModel" placeholder="e.g., gpt-3.5-turbo">
                    </div>
                    
                    <div class="form-group">
                        <label for="llmInstructions">LLM Instructions:</label>
                        <textarea id="llmInstructions" rows="3" placeholder="e.g., Make the tone more professional"></textarea>
                    </div>
                    
                    <button type="submit" id="generateBtn">Generate Document</button>
                    <button type="button" id="previewBtn">Preview</button>
                </form>
            </div>
            
            <div class="main-content">
                <h2>Document Preview</h2>
                <div id="previewArea" class="preview-area">
                    <!-- Preview will be shown here -->
                </div>
                
                <div id="actions" class="actions">
                    <button id="downloadBtn" disabled>Download Document</button>
                    <button id="copyBtn">Copy to Clipboard</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 DocTailor. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
